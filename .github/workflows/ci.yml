name: ci

on:
  push:
    branches: [main, "wip/**", "feature/**", "bugfix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    # Stable VersionSuffix per CI run so the `sutando` package produced by the pack step
    # has a deterministic version we can pin in the dnx smoke test below. Directory.Build.props
    # only generates a timestamped suffix when VersionSuffix is empty, so this overrides it.
    env:
      VersionSuffix: ci.${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          # Pinned via global.json — setup-dotnet honours it when no dotnet-version is supplied.
          global-json-file: global.json

      - name: Print SDK info
        run: dotnet --info

      # Restore-time package downloads dominate first-run cost (~5 min for the full graph
      # of 17 projects + ASP.NET Core + Playwright + DSharpPlus + Telegram.Bot). Hash every
      # csproj + Directory.Build.props + Directory.Packages.props so package version bumps
      # invalidate the cache; partial restore-keys match earlier runs.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Sutando.sln

      - name: Build
        run: dotnet build Sutando.sln -c Release --no-restore

      # Playwright binaries are downloaded lazily on first browser launch; install them
      # up-front so any opt-in integration test (currently all [Fact(Skip = "…")]) can
      # pick them up locally. To exercise those integration tests, remove the Skip
      # attribute on BrowserSessionIntegrationTests and re-run.
      - name: Install Playwright browsers (chromium)
        shell: pwsh
        run: ./src/Sutando.Browser/bin/Release/net10.0/playwright.ps1 install chromium

      # `dotnet test` on the .sln picks up the Tests project's conditional TFM list — net10.0
      # everywhere plus net10.0-windows10.0.19041.0 only on Windows runners. The default
      # TRX logger emits filenames like `<user>_<host>_<datetime>_<framework>.trx`, so the
      # two TFMs on Windows produce non-colliding files without any custom naming.
      - name: Test
        run: dotnet test Sutando.sln -c Release --no-build --logger trx --results-directory TestResults

      # Packing + dnx smoke test only run on Windows. The Cli ships as a single canonical
      # nupkg from one OS; the dnx round-trip on the other runners would only re-test the
      # same package against the same SDK version, with no added signal.
      - name: Pack (Sutando.Cli)
        if: matrix.os == 'windows-latest'
        run: dotnet pack src/Sutando.Cli/Sutando.Cli.csproj -c Release --no-build -o nuget-local

      # Pin to the freshly-packed version (driven by the job-scoped VersionSuffix above) so
      # the smoke test always exercises THIS build rather than any stale package cached
      # under the runner's home dir.
      - name: Smoke test (dnx round-trip)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: dotnet dnx Sutando.Cli --source ./nuget-local --prerelease --version "0.1.0-${VersionSuffix}" -- version

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/*.trx

      - name: Upload nuget packages (windows only — single canonical copy)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nuget-local/*.nupkg
