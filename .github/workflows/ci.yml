name: ci

on:
  push:
    branches: [main, "wip/**", "feature/**", "bugfix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          # Pinned via global.json — setup-dotnet honours it when no dotnet-version is supplied.
          global-json-file: global.json

      - name: Print SDK info
        run: dotnet --info

      - name: Restore
        run: dotnet restore Sutando.sln

      - name: Build
        run: dotnet build Sutando.sln -c Release --no-restore

      - name: Test
        run: dotnet test Sutando.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Pack (Sutando.Cli)
        run: dotnet pack src/Sutando.Cli/Sutando.Cli.csproj -c Release --no-build -o nuget-local

      - name: Smoke test (dnx round-trip)
        shell: bash
        run: dotnet dnx Sutando.Cli --source ./nuget-local --prerelease -- version

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: "**/test-results.trx"

      - name: Upload nuget packages (windows only — single canonical copy)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nuget-local/*.nupkg
